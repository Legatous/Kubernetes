
version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: smb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
